# ================= ConfigMap =================
apiVersion: v1
kind: ConfigMap
metadata:
  name: partner-portal-apis-config
data:
  SERVER_PORT: "9002"
  MONGODB_DATABASE: "cms_db_admin"
  PROFILE: "dev"
  2FA: "true"
  WSO2_CRED_GENERATOR_APIS_URL: "http://wso2-cred-generator-apis:9004"
  NOTIFICATION_MODULE_APIS_URL: "http://notification-module-apis:9005"
  VAULT_APIS_URL: "http://vault-apis:9010"
  AUTH_APIS_URL: "http://auth-apis:9009"
  AUDIT_MODULE_APIS_URL: "http://audit-module-apis:9006"
  PORTAL_URL: "<PORTAL_URL>"
---
# ================= Deployment =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: partner-portal-apis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: partner-portal-apis
  template:
    metadata:
      labels:
        app: partner-portal-apis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: partner-portal-apis
          image: "$(IMAGE_URL)"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 9002
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /partnerportal/actuator/health
              port: 9002
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /partnerportal/actuator/health
              port: 9002
            initialDelaySeconds: 10
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: partner-portal-apis-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: admin-mongodb-secret
                  key: uri
          volumeMounts:
            - name: logs
              mountPath: /opt/logs   # container writes logs here
      volumes:
        - name: logs
          emptyDir: {}

---
# ================= Service =================
apiVersion: v1
kind: Service
metadata:
  name: partner-portal-apis
spec:
  type: NodePort
  selector:
    app: partner-portal-apis
  ports:
    - protocol: TCP
      port: 9002
      targetPort: 9002
      nodePort: 30002