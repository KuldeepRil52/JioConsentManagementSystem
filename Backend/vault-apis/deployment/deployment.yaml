# ================= ConfigMap =================
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-apis-config
data:
  SERVER_PORT: "9010"
  MONGODB_DATABASE: "jiovault"
  PROFILE: "st"
  # Override via Secret in production: ROOTKEY (Vault token)
  ROOTKEY: "<vault-token>"
  EXT_VAULT_URL: "http://<vault-host>:8200"

---
# ================= Deployment =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault-apis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: vault-apis
  template:
    metadata:
      labels:
        app: vault-apis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: vault-apis
          image: vault-apis:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 9003
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: vault-apis-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: uri
          volumeMounts:
            - name: logs
              mountPath: /opt/logs   # container writes logs here
      volumes:
        - name: logs
          emptyDir: {}

---
# ================= Service =================
apiVersion: v1
kind: Service
metadata:
  name: vault-apis
spec:
  type: NodePort
  selector:
    app: vault-apis
  ports:
    - protocol: TCP
      port: 9010
      targetPort: 9010
      nodePort: 30010