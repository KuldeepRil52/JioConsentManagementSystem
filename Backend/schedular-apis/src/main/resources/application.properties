# =============================================================================
# SCHEDULAR APPLICATION CONFIGURATION
# =============================================================================

# Application Configuration
spring.application.name=schedular

# Server Configuration
server.servlet.context-path=/schedular
server.port=${SERVER_PORT:9001}

# MongoDB Configuration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/?authSource=admin}
spring.data.mongodb.database=${MONGODB_DATABASE:cms_db_admin}
spring.data.mongodb.auto-index-creation=true

# External Service Configuration
notification.service.base.url=${NOTIFICATION_MODULE_APIS_URL:http://notification-module-apis:9005}
notification.service.endpoints.trigger-event=/notification/v1/events/trigger

audit.service.base.url=${AUDIT_MODULE_APIS_URL:http://audit-module-apis:9006}
audit.service.endpoints=/audit/v1/audit

vault.service.base.url=${VAULT_APIS_URL:http://localhost:30010}
vault.service.endpoints.sign=/client/sign
vault.service.endpoints.encryptPayload=/client/encryptPayload

system-registry.service.base.url=${SYSTEM_REGISTRY_APIS_URL:http://localhost:30011}
system-registry.service.endpoints.consent-withdraw=/registry/api/v1/consents/{consentId}/withdraw

# Jackson Configuration
spring.jackson.serialization.write-dates-as-timestamps=false

# =============================================================================
# SCHEDULING JOB CONFIGURATION
# =============================================================================

# Consent Handle Expiry Job Configuration
# Cron expression for consent handle expiry job (runs daily at 2 AM)
schedular.job.consent-handle-expiry.cron=${CONSENT_HANDLE_EXPIRY_CRON:0 0 2 * * ?}
# Batch size for processing consent handles
schedular.job.consent-handle-expiry.batch-size=${CONSENT_HANDLE_EXPIRY_BATCH_SIZE:5000}
# Expiry duration period type (MONTHS, YEARS, DAYS, etc.)
schedular.job.consent-handle-expiry.period-type=${CONSENT_HANDLE_EXPIRY_PERIOD_TYPE:MONTHS}
# Expiry duration value
schedular.job.consent-handle-expiry.period-value=${CONSENT_HANDLE_EXPIRY_PERIOD_VALUE:1}
# Thread pool size for parallel tenant processing
schedular.job.consent-handle-expiry.thread-pool-size=${CONSENT_HANDLE_EXPIRY_THREAD_POOL_SIZE:10}

# Consent Expiry Job Configuration
# Cron expression for consent expiry job (runs daily at 2:30 AM)
schedular.job.consent-expiry.cron=${CONSENT_EXPIRY_CRON:0 30 02 * * ?}
# Batch size for processing expired consents
schedular.job.consent-expiry.batch-size=${CONSENT_EXPIRY_BATCH_SIZE:1000}
# Thread pool size for parallel tenant processing
schedular.job.consent-expiry.thread-pool-size=${CONSENT_EXPIRY_THREAD_POOL_SIZE:10}

# Consent Preference Expiry Reminder Job Configuration
# Cron expression for preference expiry reminder job (runs daily at 2:15 AM)
schedular.job.consent-preference-expiry.cron=${CONSENT_PREFERENCE_EXPIRY_CRON:0 15 02 * * ?}
# Batch size for processing consents while searching for upcoming preference expiries
schedular.job.consent-preference-expiry.batch-size=${CONSENT_PREFERENCE_EXPIRY_BATCH_SIZE:500}
# Thread pool size used by the reminder service for parallel tenant processing
schedular.job.consent-preference-expiry.thread-pool-size=${CONSENT_PREFERENCE_EXPIRY_THREAD_POOL_SIZE:10}

# Default reminder period in days when consent configuration is not present
consent.default-reminder-days=${CONSENT_DEFAULT_REMINDER_DAYS:30}
# Portal URL for notification links
consent-preference-expiry.portal-url=${CONSENT_PREFERENCE_EXPIRY_PORTAL_URL:}

# Grievance Escalation Job Configuration
# Cron for grievance escalation job (runs daily at 3 AM)
schedular.job.grievance-escalation.cron=${GRIEVANCE_ESCALATION_CRON:0 0 3 * * ?}
# Batch size for processing grievances per tenant
schedular.job.grievance-escalation.batch-size=${GRIEVANCE_ESCALATION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.grievance-escalation.thread-pool-size=${GRIEVANCE_ESCALATION_THREAD_POOL_SIZE:10}

# Default escalation days if grievance config not present
grievance.default-escalation-days=${GRIEVANCE_DEFAULT_ESCALATION_DAYS:2}

# Cookie Consent schedulers
schedular.job.cookie-consent-handle-expiry.cron=${COOKIE_CONSENT_HANDLE_EXPIRY_CRON:0 * * * * *}
schedular.job.cookie-consent-expiry.cron=${COOKIE_CONSENT_EXPIRY_CRON:0 0 0 * * *}

# Consent Artifact Retention Job Configuration
# Cron for Consent Artifact Retention job (runs daily at 3 AM)
schedular.job.consent-artifact-retention.cron=${CONSENT_ARTIFACT_RETENTION_CRON:0 45 02 * * ?}
# Batch size for processing consents per tenant
schedular.job.consent-artifact-retention.batch-size=${CONSENT_ARTIFACT_RETENTION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.consent-artifact-retention.thread-pool-size=${CONSENT_ARTIFACT_RETENTION_THREAD_POOL_SIZE:10}

# Default retention days if consent config not present
consent-artifact.default-retention-days=${CONSENT_ARTIFACT_DEFAULT_RETENTION_DAYS:2}

# Cookie Consent Retention Job Configuration
# Cron for Cookie Consent Retention job (runs daily at 3 AM)
schedular.job.cookie-consent-retention.cron=${COOKIE_CONSENT_RETENTION_CRON:0 15 03 * * ?}
# Batch size for processing cookies per tenant
schedular.job.cookie-consent-retention.batch-size=${COOKIE_CONSENT_RETENTION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.cookie-consent-retention.thread-pool-size=${COOKIE_CONSENT_RETENTION_THREAD_POOL_SIZE:10}

# Default retention days if cookie config not present
cookie-consent.default-retention-days=${COOKIE_CONSENT_DEFAULT_RETENTION_DAYS:2}

# Grievance Retention Job Configuration
# Cron for Grievance Retention job (runs daily at 3 AM)
schedular.job.grievance-retention.cron=${GRIEVANCE_RETENTION_CRON:0 30 03 * * ?}
# Batch size for processing grievances per tenant
schedular.job.grievance-retention.batch-size=${GRIEVANCE_RETENTION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.grievance-retention.thread-pool-size=${GRIEVANCE_RETENTION_THREAD_POOL_SIZE:10}

# Default retention days if grievance config not present
grievance.default-retention-days=${GRIEVANCE_DEFAULT_RETENTION_DAYS:2}

# Logs Retention Job Configuration
# Cron for Logs Retention job (runs daily at 3 AM)
schedular.job.logs-retention.cron=${LOGS_RETENTION_CRON:0 45 03 * * ?}
# Batch size for processing Logs per tenant
schedular.job.logs-retention.batch-size=${LOGS_RETENTION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.logs-retention.thread-pool-size=${LOGS_RETENTION_THREAD_POOL_SIZE:10}

# Default retention days if log config not present
logs.default-retention-days=${LOGS_DEFAULT_RETENTION_DAYS:2}

# Data Retention Job Configuration
# Cron for Data Retention job (runs daily at 3 AM)
schedular.job.data-retention.cron=${DATA_RETENTION_CRON:0 00 04 * * ?}
# Batch size for processing data per tenant
schedular.job.data-retention.batch-size=${DATA_RETENTION_BATCH_SIZE:500}
# Thread pool size for parallel tenant processing
schedular.job.data-retention.thread-pool-size=${DATA_RETENTION_THREAD_POOL_SIZE:10}

# Default retention days if data config not present
data.default-retention-days=${DATA_DEFAULT_RETENTION_DAYS:2}
# =============================================================================