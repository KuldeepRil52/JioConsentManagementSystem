# ================= ConfigMap =================
apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-cred-generator-apis-config
data:
  SERVER_PORT: "9004"
  MONGODB_DATABASE: "cms_db_admin"
  PROFILE: "st"
  # Override via Secret in production: REGISTER_TOKEN, TOKEN_AUTH
  REGISTER_TOKEN: "<base64-username-password>"
  TOKEN_AUTH: "<base64-clientid-clientsecret>"
  WSO2_BASE_URL: "https://<wso2-host>:9443"

---
# ================= Deployment =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wso2-cred-generator-apis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: wso2-cred-generator-apis
  template:
    metadata:
      labels:
        app: wso2-cred-generator-apis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: wso2-cred-generator-apis
          image: "$(IMAGE_URL)"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 9004
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          envFrom:
            - configMapRef:
                name: wso2-cred-generator-apis-config
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: uri
          volumeMounts:
            - name: logs
              mountPath: /opt/logs   # container writes logs here
      volumes:
        - name: logs
          emptyDir: {}
