# ================= Tenant Errors =================
TENANT_001=Request body is required
TENANT_002=TenantId is required
TENANT_003=TenantName is required
TENANT_004=Tenant not found in tenant-specific DB
TENANT_005=Tenant already registered
TENANT_006=Tenant ID already exists with a different tenantName: {0}
TENANT_007=TenantDB not found. Onboarding cannot proceed: {0}

# ================= Business Errors =================
BUSINESS_001=businessId is required
BUSINESS_002=businessName is required
BUSINESS_003=Business already onboarded
BUSINESS_004=businessName already exists: {0}
BUSINESS_005=Business name does not match existing onboarded record

#====================== Data Processor Errors ============

DATA_PROCESSOR_001 = dataProcessorId is required
DATA_PROCESSOR_002 = dataProcessorName is required
DATA_PROCESSOR_003 = dataProcessorName already exists: {0}
DATA_PROCESSOR_004=Data Processor name does not match existing onboarded record


# ================= WSO2 Errors =================
WSO2_001=WSO2 user registration failed
WSO2_002=WSO2 token generation failed
WSO2_003=WSO2 application creation failed
WSO2_004=WSO2 key generation failed
WSO2_005=WSO2 API subscription failed

# ================= Generic Errors =================
NEGD_400=Invalid request
NEGD_401=Missing required parameter: {0}
NEGD_500=Internal server error
