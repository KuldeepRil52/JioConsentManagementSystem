spring.application.name=credentials_generation
server.port=${SERVER_PORT}
spring.profiles.active=dev


security.basic.enable: false
security.ignored=/**
server.servlet.context-path=/api/v1
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.url=/v3/api-docs

# Disable default security for Swagger UI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

spring.jackson.serialization.write-dates-as-timestamps=false


#mongodb
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}

#wso2 api urls
# Set REGISTER_TOKEN, TOKEN_AUTH, WSO2_BASE_URL via environment (no default credentials)
REGISTER_TOKEN=${REGISTER_TOKEN}
TOKEN_AUTH=${TOKEN_AUTH}
TOKEN_API=${WSO2_BASE_URL}/oauth2/token
REGISTER_API=${WSO2_BASE_URL}/api/identity/user/v1.0/me
Generate_Keys= ${WSO2_BASE_URL}/api/am/devportal/v2/applications
CreateApplicationUrl= ${WSO2_BASE_URL}/api/am/devportal/v2/applications
MULTIPLE_SUBSCRIPTION= ${WSO2_BASE_URL}/api/am/devportal/v2/subscriptions/multiple