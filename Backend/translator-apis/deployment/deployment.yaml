# ================= ConfigMap =================
apiVersion: v1
kind: ConfigMap
metadata:
  name: translator-apis-config
data:
  SERVER_PORT: "9003"
  MONGODB_DATABASE: "cms_db_admin"
  PROFILE: "st"
  PROXY_ENABLED: "false"
  PROXY_HOST: "<proxy-host>"
  PROXY_PORT: "8080"

---
# ================= Deployment =================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: translator-apis
spec:
  replicas: 1
  revisionHistoryLimit: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: translator-apis
  template:
    metadata:
      labels:
        app: translator-apis
    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: translator-apis
          image: "$(IMAGE_URL)"
          imagePullPolicy: IfNotPresent

          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault

          ports:
            - containerPort: 9003

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
              ephemeral-storage: "1Gi"

            limits:
              cpu: "500m"
              memory: "1Gi"
              ephemeral-storage: "2Gi"

          startupProbe:
            httpGet:
              path: /v1/actuator/health/liveness
              port: 9003
            failureThreshold: 30
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /v1/actuator/health/liveness
              port: 9003
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /v1/actuator/health/readiness
              port: 9003
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          envFrom:
            - configMapRef:
                name: translator-apis-config

          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-secret
                  key: uri

          volumeMounts:
            - name: logs
              mountPath: /opt/logs   # container writes logs here

      volumes:
        - name: logs
          emptyDir: {}
