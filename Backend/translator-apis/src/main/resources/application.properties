spring.application.name=multitranslator
server.port=${SERVER_PORT:9002}
server.servlet.context-path=/v1
log_path=/log/consent


spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:cms_db_admin}


spring.data.mongodb.auto-index-creation=true

#ProxyDetails
http.proxy.enabled=${PROXY_ENABLED:false}
http.proxy.host=${PROXY_HOST:}
http.proxy.port=${PROXY_PORT:8080}

# Timeouts
http.connect.timeout=10000
http.read.timeout=20000

# Enable proxy debug logging
logging.level.com.jio.multitranslator.interceptor=DEBUG

# Actuator endpoints configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.metrics.export.defaults.enabled=true
